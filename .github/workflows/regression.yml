name: Cross-Platform Regression Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.2"

jobs:
  native-regression:
    name: Rust native regression (AC1-AC2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run cargo tests
        run: cargo test -p opencat-core -p opencat-engine -p opencat --lib
      - name: Run cargo clippy (core)
        run: cargo clippy -p opencat-core --lib -- -D warnings
      - name: Run cargo clippy (engine)
        run: cargo clippy -p opencat-engine --lib -- -D warnings
      - name: Run cargo clippy (opencat)
        run: cargo clippy -p opencat --lib -- -D warnings

  web-regression:
    name: Web regression (AC3-AC4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run bun tests
        run: bun run test
      - name: TypeScript check
        run: bunx tsc --noEmit
      - name: Build
        run: bun run build

  crate-web-regression:
    name: Crate web regression (AC4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/opencat-web/web
    steps:
      - uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: TypeScript build
        run: bun run build:types
      - name: Vite build
        run: bunx vite build

  oracle-regression:
    name: Browser oracle SSIM (AC5-AC7)
    runs-on: ubuntu-latest
    needs: [native-regression, web-regression]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Setup Chrome and ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      - name: Setup ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg miniserve
      - name: Run SSIM oracle tests
        id: oracle
        continue-on-error: true
        run: |
          cargo test -- --ignored web_frame_oracle 2>&1 | tee target/oracle-output.txt
      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oracle-evidence
          path: |
            target/opencat-web-oracle/
            target/oracle-output.txt
