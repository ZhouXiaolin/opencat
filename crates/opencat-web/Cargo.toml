[package]
name = "opencat-web"
version.workspace = true
edition.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
opencat-core = { path = "../opencat-core" }
anyhow = "1.0"
tracing = "0.1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "CanvasRenderingContext2d",
    "HtmlCanvasElement",
    "Window",
    "Document",
] }
