<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>OpenCat Web Frame Oracle</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="frame"></canvas>
    <script src="/canvaskit/canvaskit.js"></script>
    <script type="module">
      import {
        clearBlobs,
        clearVideoCache,
        createSurfaceWithFallback,
        getRendererOrThrow,
        initWasm,
        injectVideoFramesForRender,
        prepareCatalogVideoSources,
        registerVideoGlobals,
        renderEncodedDrawFrame,
        setAssetReader,
        setWasmBaseUrl,
        setWorkerBaseUrl,
      } from '/wasm/opencat.js';

      const canvas = document.getElementById('frame');

      function compositionFrameCount(fps, duration, frames) {
        if (Number.isFinite(frames) && frames > 0) return Math.floor(frames);
        const f = Number(fps) || 30;
        const d = Number(duration) || 0;
        return Math.max(1, Math.ceil(d * f));
      }

      function parseCompositionInfo(jsonl) {
        const trimmedSource = jsonl.trim();
        if (trimmedSource.startsWith('<')) {
          const root = new DOMParser().parseFromString(trimmedSource, 'application/xml').documentElement;
          const width = Number(root.getAttribute('width'));
          const height = Number(root.getAttribute('height'));
          const fps = Number(root.getAttribute('fps'));
          const duration = Number(root.getAttribute('duration'));
          return {
            width,
            height,
            fps,
            frames: compositionFrameCount(fps, duration, Number(root.getAttribute('frames'))),
          };
        }
        for (const line of jsonl.split(/\r?\n/)) {
          const trimmed = line.trim();
          if (!trimmed) continue;
          const item = JSON.parse(trimmed);
          if (item.type === 'composition') {
            return {
              width: item.width,
              height: item.height,
              fps: item.fps,
              frames: compositionFrameCount(item.fps, item.duration, item.frames),
            };
          }
        }
        throw new Error('JSONL composition header not found');
      }

      function bytesToHex(bytes) {
        let out = '';
        for (let i = 0; i < bytes.length; i++) {
          out += bytes[i].toString(16).padStart(2, '0');
        }
        return out;
      }

      const ready = (async () => {
        setWasmBaseUrl('/wasm/');
        setWorkerBaseUrl('/wasm/');
        await initWasm();
        setAssetReader(async (path) => {
          const name = String(path).split('/').pop();
          const response = await fetch(`/assets/${name}`);
          if (!response.ok) throw new Error(`asset reader: HTTP ${response.status} for ${path}`);
          return await response.arrayBuffer();
        });
        const CK = await globalThis.CanvasKitInit({
          locateFile: (file) => `/canvaskit/${file}`,
        });
        globalThis.__canvasKit = CK;
        registerVideoGlobals();
      })();

      async function renderFrame(jsonl, frame) {
        await ready;

        clearBlobs();
        await clearVideoCache();

        const comp = parseCompositionInfo(jsonl);
        if (frame < 0 || frame >= comp.frames) {
          throw new Error(`frame ${frame} out of range 0..${comp.frames - 1}`);
        }

        canvas.width = comp.width;
        canvas.height = comp.height;

        const renderer = getRendererOrThrow();

        // Host-owned pipeline (issue #8): open the design once (fetches
        // resources, builds catalog, hydrates captions, opens pipeline),
        // prepare WebCodecs video sources, then render the requested frame.
        // Without prepareCatalogVideoSources, injectVideoFramesForRender
        // silently blanks every VideoFrame draw (profile-showcase s2/s3).
        const catalogJson = await renderer.open_design(jsonl);
        await prepareCatalogVideoSources(catalogJson);

        // Headless SwiftShader often cannot import VideoFrame textures via
        // makeImageFromTextureSource. Inject as CPU RGBA so draw-ir can
        // MakeImage() without a GPU texture path.
        await injectVideoFramesForRender({
          renderer,
          frame,
          quality: 'exact',
          frameOutput: 'rgba',
        });

        const CK = globalThis.__canvasKit;
        let surface;
        try {
          surface = createSurfaceWithFallback(CK, canvas, undefined, {
            alphaType: CK.AlphaType.Premul,
          });
          if (!surface) throw new Error('surface creation failed');

          const ckCanvas = surface.getCanvas();
          const ir = renderer.build_frame_ir(frame);
          renderEncodedDrawFrame(ir, ckCanvas, CK, { surface });
          surface.flush();

          const snapshot = surface.makeImageSnapshot();
          try {
            const pixels = snapshot.readPixels(0, 0, {
              width: comp.width,
              height: comp.height,
              colorType: CK.ColorType.RGBA_8888,
              alphaType: CK.AlphaType.Premul,
              colorSpace: CK.ColorSpace.SRGB,
            });
            if (!pixels) throw new Error('readPixels returned null');
            return {
              width: comp.width,
              height: comp.height,
              rgbaHex: bytesToHex(pixels),
            };
          } finally {
            snapshot.delete();
          }
        } finally {
          surface?.delete();
        }
      }

      globalThis.__opencatOracle = { renderFrame };
    </script>
  </body>
</html>
